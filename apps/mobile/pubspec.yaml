name: tiktok_downloader
description: Lightweight TikTok downloader app for Android and iOS.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.8.0+1
  firebase_analytics: ^11.4.6
  firebase_core: ^3.13.1
  firebase_crashlytics: ^4.3.6
  firebase_performance: ^0.10.1+6
  flutter_riverpod: ^2.6.1
  google_mobile_ads: ^5.3.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app-logo.png"
  adaptive_icon_background: "#101214"
  adaptive_icon_foreground: "assets/app-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app-logo.png
